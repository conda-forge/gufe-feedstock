schema_version: 1

context:
  python_min: "3.11"
  name: gufe
  version: 1.11.0

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://github.com/OpenFreeEnergy/${{ name }}/archive/refs/tags/v${{ version }}.tar.gz
  sha256: 2cd0aaa1d53027d199e10090c2c77af5f3cc1ab25b4069f94274670065cb568b
  patches:
    - py314-fixes.patch  # Fixes python 3.14 support 

build:
  number: 1
  noarch: python
  script: SETUPTOOLS_SCM_PRETEND_VERSION=${{ version }} ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - pip
    - python ${{ python_min }}.*,<3.14
    - setuptools >=61.0
    - setuptools_scm
  run:
    - msgpack-python
    - networkx
    - numpy
    - openff-toolkit-base >=0.15.1
    - openff-units >=0.3.1
    - openmm
    - pint
    - pip
    - pooch >=1.9.0  # min needed for https://github.com/fatiando/pooch/issues/502
    - pydantic >=2.0,<2.12  # https://github.com/openforcefield/openff-interchange/issues/1346
    - python >=${{ python_min }}
    - rdkit >=2024.09.1  # github.com/OpenFreeEnergy/gufe/issues/664
    - typing-extensions
    - zstandard

tests:
  - python:
      imports:
        - gufe
      pip_check: false
      python_version: ${{ python_min }}.*
  - requirements:
      run:
        - pip
        - pooch
        - pytest <9.1.0  # This pin can be dropped in the next gufe release
        - python 3.14.*  # This should be: "${{ python_min }}.*" but for just this build I want to make sure python 3.14 works
    script:
      - python -c "import ${{ name }}; print(${{ name }}.__version__)"
      - python -c "import ${{ name }}; assert(${{ name }}.__version__ == '${{ version }}')"
      - pytest -v --pyargs gufe

about:
  summary: gufe
  description: |
    Abstract base classes for free energy calculations by Open Free Energy
  license: MIT
  license_file: LICENSE
  homepage: https://github.com/OpenFreeEnergy/gufe
  repository: https://github.com/OpenFreeEnergy/gufe
  documentation: https://gufe.openfree.energy

extra:
  recipe-maintainers:
    - IAlibay
    - dotsdl
    - dwhswenson
    - mikemhenry
    - atravitz
